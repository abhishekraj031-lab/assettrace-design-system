<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dropdown — AssetTrace Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/colors.css">
  <link rel="stylesheet" href="../../tokens/semantic-colors.css">
  <link rel="stylesheet" href="../../tokens/spacing.css">
  <link rel="stylesheet" href="../../tokens/typography.css">
  <link rel="stylesheet" href="dropdown.css">
  <style>body{font-family:'Poppins',sans-serif;background:#f8fafc;padding:32px}.grid{display:flex;flex-wrap:wrap;gap:24px}.s{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin:24px 0 12px}</style>
</head>
<body>
  <div class="s">Default</div>
  <div class="grid">
    <div class="dropdown-group"><label class="dropdown-group__label">Category</label><div class="dropdown"><span class="dropdown__text">Select option</span><span class="dropdown__arrow">▾</span></div></div>
    <div class="dropdown-group"><label class="dropdown-group__label">Category</label><div class="dropdown dropdown--selected"><span class="dropdown__text dropdown__text--selected">Cash Buyout</span><span class="dropdown__arrow">▾</span></div></div>
    <div class="dropdown-group"><label class="dropdown-group__label">Category</label><div class="dropdown dropdown--disable"><span class="dropdown__text">Select option</span><span class="dropdown__arrow">▾</span></div></div>
  </div>
</body></html>
