<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stepper — AssetTrace Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/colors.css">
  <link rel="stylesheet" href="../../tokens/semantic-colors.css">
  <link rel="stylesheet" href="../../tokens/spacing.css">
  <link rel="stylesheet" href="../../tokens/typography.css">
  <link rel="stylesheet" href="stepper.css">
  <style>body{font-family:'Poppins',sans-serif;background:#f8fafc;padding:32px;max-width:600px}</style>
</head>
<body>
  <div class="stepper">
    <div class="stepper__step stepper__step--completed">
      <div class="stepper__circle">✓</div>
      <span class="stepper__label">Details</span>
    </div>
    <div class="stepper__step stepper__step--active">
      <div class="stepper__circle">2</div>
      <span class="stepper__label">Review</span>
    </div>
    <div class="stepper__step">
      <div class="stepper__circle">3</div>
      <span class="stepper__label">Confirm</span>
    </div>
  </div>
</body></html>
